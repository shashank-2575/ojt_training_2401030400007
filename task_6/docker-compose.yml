version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: billing-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js API application service
  app:
    build: .
    container_name: billing-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/billingSystem
    depends_on:
      - mongodb

volumes:
  mongo-data:
