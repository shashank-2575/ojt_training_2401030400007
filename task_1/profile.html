<!DOCTYPE html>

<body bgcolor="#fafafa">
    <header class="head">
        <div class="logo"><span>MakerBazar.in</span></div>
        <div style="font-size: 20px;"><a href="order.html">Order</a></div>
        <div style="font-size: 20px;"><a href="profile.html">Profile</a></div>
        <div><a href="profile.html"><button id="profile"><img src="profile1.svg" alt="Profile"></button></a></div>
    </header>
    <main class="main">
        <div class="logo2">
            <h2>Profile</h2>
        </div>
        <div class="edit_name">
            <div class="name_label">
                <label style="color:grey">Name<button style="border:none ;background-color: #fff;"><img
                            src="pencil_logo.svg" class="pencil_icon" alt="Edit"></button></label><br>
                <label style="color:grey">Email</label><br>

            </div>
        </div><br>

        <div class="edit_address">
            <div class="address_label">
                <label>Address
                    <button id="addAddressBtn"
                        style="border:none;background-color: #fff; color:#20a0b9;font-weight:600;">
                        +Add
                    </button>
                </label><br>
                <label style="color:grey">Email</label><br>
            </div>
        </div><br>

        <div class="but">
            <div><button style="border: 3px solid rgb(194, 191, 191);;font-weight: 400; font-size: 19px;">
                    <p>Sign Out</p>
                </button></div>
            <div><button style="border:none ;font-weight: 400; font-size: 19px;">
                    <p>Sign Out of all devices</p>
                </button></div>
        </div>

    </main>
    <div class="modal-overlay hidden" id="modalOverlay"></div>
    <div class="modal hidden" id="addressModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close-modal" id="closeModal" aria-label="Close modal">&times;</button>
            <h3 id="modalTitle">Add Address</h3>
            <form class="row g-3 popup-form">
                <div class="col-md-6">
                    <label for="inputEmail4" class="form-label">Email &ensp;<svg xmlns="http://www.w3.org/2000/svg"
                            width="16" height="16" fill="currentColor" class="bi bi-envelope" viewBox="0 0 16 16">
                            <path
                                d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z" />
                        </svg></label>
                    <input type="email" class="form-control" id="inputEmail4" placeholder="Email">
                </div>
                <div class="col-md-6">
                    <label for="inputPassword4" class="form-label">Password &ensp;
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-lock" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4M4.5 7A1.5 1.5 0 0 0 3 8.5v5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 11.5 7zM8 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
                        </svg>
                    </label>
                    <input type="password" class="form-control" id="inputPassword4">
                </div>
                <div class="col-12">
                    <label for="inputAddress" class="form-label">Address &ensp;
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-house-add-fill" viewBox="0 0 16 16">
                            <path
                                d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 1 1-1 0v-1h-1a.5.5 0 1 1 0-1h1v-1a.5.5 0 0 1 1 0" />
                            <path
                                d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z" />
                            <path d="m8 3.293 4.712 4.712A4.5 4.5 0 0 0 8.758 15H3.5A1.5 1.5 0 0 1 2 13.5V9.293z" />
                        </svg>
                    </label>
                    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                </div>
                <div class="col-12">
                    <label for="inputAddress2" class="form-label">Address 2 &ensp;
                        <svg
                            xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-house-add-fill" viewBox="0 0 16 16">
                            <path
                                d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 1 1-1 0v-1h-1a.5.5 0 1 1 0-1h1v-1a.5.5 0 0 1 1 0" />
                            <path
                                d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z" />
                            <path d="m8 3.293 4.712 4.712A4.5 4.5 0 0 0 8.758 15H3.5A1.5 1.5 0 0 1 2 13.5V9.293z" />
                        </svg>
                    </label>
                    <input type="text" class="form-control" id="inputAddress2"
                        placeholder="Apartment, studio, or floor">
                </div>
                <div class="col-md-6">
                    <label for="inputCity" class="form-label">City</label>
                    <input type="text" class="form-control" id="inputCity">
                </div>
                <div class="col-md-4">
                    <label for="inputState" class="form-label">State</label>
                    <select id="inputState" class="form-select">
                        <option selected>Choose...</option>
                        <option>...</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="inputZip" class="form-label">Zip &ensp;
                        <svg xmlns="http://www.w3.org/2000/svg"
                            width="16" height="16" fill="currentColor" class="bi bi-file-zip-fill" viewBox="0 0 16 16">
                            <path
                                d="M8.5 9.438V8.5h-1v.938a1 1 0 0 1-.03.243l-.4 1.598.93.62.93-.62-.4-1.598a1 1 0 0 1-.03-.243" />
                            <path
                                d="M4 0h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2m2.5 8.5v.938l-.4 1.599a1 1 0 0 0 .416 1.074l.93.62a1 1 0 0 0 1.109 0l.93-.62a1 1 0 0 0 .415-1.074l-.4-1.599V8.5a1 1 0 0 0-1-1h-1a1 1 0 0 0-1 1m1-5.5h-1v1h1v1h-1v1h1v1H9V6H8V5h1V4H8V3h1V2H8V1H6.5v1h1z" />
                        </svg>
                    </label>
                    <input type="text" class="form-control" id="inputZip">
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck">
                        <label class="form-check-label" for="gridCheck">
                            Check me out
                        </label>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
        </d iv>
        <script>
            const addButton = document.getElementById('addAddressBtn');
            const closeButton = document.getElementById('closeModal');
            const modal = document.getElementById('addressModal');
            const overlay = document.getElementById('modalOverlay');

            function openModal() {
                modal.classList.remove('hidden');
                overlay.classList.remove('hidden');
                document.body.classList.add('modal-open');
            }

            function closeModalDialog() {
                modal.classList.add('hidden');
                overlay.classList.add('hidden');
                document.body.classList.remove('modal-open');
            }

            addButton?.addEventListener('click', function (event) {
                event.preventDefault();
                openModal();
            });

            closeButton?.addEventListener('click', closeModalDialog);
            overlay?.addEventListener('click', closeModalDialog);
            window.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') {
                    closeModalDialog();
                }
            });
        </script>
</body>

</html>
