<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="max-w-2xl mx-auto mt-12 p-6 bg-white rounded shadow">
    <h1 id="welcome" class="text-2xl font-bold">Welcome</h1>
    <p id="info" class="text-sm text-gray-600 mt-1"></p>

    <h3 class="mt-6 font-semibold">Update Profile</h3>
    <form id="profileForm" class="mt-3 space-y-3">
      <input type="text" id="firstName" name="firstName" class="w-full border rounded px-3 py-2" placeholder="First name">
      <input type="text" id="lastName" name="lastName" class="w-full border rounded px-3 py-2" placeholder="Last name">
      <input type="password" id="newPassword" name="newPassword" class="w-full border rounded px-3 py-2" placeholder="New password">
      <div>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">Save Changes</button>
      </div>
    </form>

    <form action="/logout" method="POST" class="mt-4">
      <button type="submit" class="bg-gray-200 px-4 py-2 rounded">Logout</button>
    </form>
  </div>

  <script>
    async function loadUser() {
      const res = await fetch('/api/me');
      if (!res.ok) {
        window.location = '/';
        return;
      }
      const user = await res.json();
      document.getElementById('welcome').textContent = `Welcome, ${user.firstName} ${user.lastName}`;
      document.getElementById('info').textContent = `Username: ${user.userName} — Registered: ${new Date(user.createdAt).toDateString()}`;
      document.getElementById('firstName').value = user.firstName || '';
      document.getElementById('lastName').value = user.lastName || '';
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new URLSearchParams(new FormData(e.target));
      const res = await fetch('/profile', { method: 'POST', body: data });
      if (res.ok) {
        window.location.reload();
      } else {
        alert('Update failed');
      }
    });

    loadUser();
  </script>
</body>
</html>
